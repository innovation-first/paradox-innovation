<!-- Mermaid init + robust rendering (Stack theme) -->
<script type="module">
(() => {
  if (window.__MERMAID_STACK_INIT__) return;
  window.__MERMAID_STACK_INIT__ = true;

  const MERMAID_URL = "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

  let debounceTimer;
  function scheduleRender(fn, delay = 100) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(fn, delay);
  }

  function logInfo(...args)  { try { console.info("[mermaid]", ...args); } catch {} }
  function logWarn(...args)  { try { console.warn("[mermaid]", ...args); } catch {} }
  function logError(...args) { try { console.error("[mermaid]", ...args); } catch {} }

  function setFocus(wrap, on, rerender) {
    if (!wrap) return;
    const root = document.documentElement;
    const btn  = wrap.querySelector(".mermaid-focus-btn");

    wrap.classList.toggle("focused", !!on);
    root.classList.toggle("mermaid-focus-open", !!on);

    if (btn) {
      btn.setAttribute("aria-expanded", String(!!on));
      btn.textContent = on ? "✕ Close" : "🔍 Focus";
    }
    if (rerender) scheduleRender(renderMermaids, 80);
  }

  import(MERMAID_URL)
    .then(({ default: mermaid }) => {
      logInfo("Mermaid module loaded.");

      const initialScheme =
        document.documentElement.dataset.scheme ||
        (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose",
        theme: initialScheme === "dark" ? "dark" : "neutral",
      });
      logInfo("Initialized with theme:", initialScheme);

      const schemeObserver = new MutationObserver(() => {
        const s = document.documentElement.dataset.scheme;
        mermaid.initialize({ startOnLoad: false, theme: s === "dark" ? "dark" : "neutral" });
        logInfo("Theme changed; re-initialized Mermaid with theme:", s);
        scheduleRender(renderMermaids, 60);
      });
      schemeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ["data-scheme"] });

      function renderMermaids() {
        const nodes = Array.from(document.querySelectorAll(".mermaid"));
        if (!nodes.length) {
          logInfo("No .mermaid nodes found to render.");
          return;
        }
        logInfo(`Rendering ${nodes.length} diagram(s)...`);

        // Prepare nodes: restore original graph text and hide to avoid flicker
        nodes.forEach((el, idx) => {
          const graph = el.getAttribute("data-graph");
          if (graph) {
            el.removeAttribute("data-processed"); // allow reprocess
            el.innerHTML = graph;                 // restore original
          } else {
            // Fallback: cache current textContent if data-graph is missing
            const raw = (el.textContent || "").trim();
            if (raw) el.setAttribute("data-graph", raw);
          }
          el.style.visibility = "hidden";
          el.style.transition = "visibility 0s linear 0.05s";
          el.dataset._renderIndex = String(idx);
        });

        mermaid
          .run({ nodes })
          .then(() => {
            nodes.forEach((el) => {
              el.style.visibility = ""; // show again
              el.style.transition = "";
            });
            logInfo("Render complete.");
          })
          .catch((err) => {
            nodes.forEach((el) => {
              el.style.visibility = ""; // show raw content if failed
              el.style.transition = "";
            });
            logError("Render failed:", err);
          });
      }

      const ro = new ResizeObserver((entries) => {
        if (entries.some((e) => e.contentRect && e.contentRect.width > 0)) {
          logInfo("Resize observed; scheduling re-render.");
          scheduleRender(renderMermaids, 120);
        }
      });

      function observeMermaids() {
        const targets = document.querySelectorAll(".mermaid");
        targets.forEach((el) => ro.observe(el));
        if (targets.length) logInfo(`Observing ${targets.length} diagram container(s).`);
      }

      // Initial load after layout settles
      window.addEventListener("load", () => {
        logInfo("Window load event; scheduling initial render.");
        scheduleRender(renderMermaids, 120);
        observeMermaids();
      });

      // BFCache restores
      window.addEventListener("pageshow", (e) => {
        if (e.persisted) {
          logInfo("Page restored from bfcache; re-rendering.");
          scheduleRender(renderMermaids, 80);
          observeMermaids();
        }
      });

      // SPA-ish hooks (harmless if unused)
      const spaEvents = [
        "pjax:complete",
        "astro:after-swap",
        "swup:contentReplaced",
      ];
      spaEvents.forEach((evt) => {
        document.addEventListener(evt, () => {
          logInfo(`${evt} event; re-rendering.`);
          scheduleRender(renderMermaids, 80);
          observeMermaids();
        });
      });

      // <details> toggles
      document.addEventListener(
        "toggle",
        (e) => {
          if (e.target.tagName === "DETAILS" && e.target.open) {
            logInfo("<details> opened; re-rendering.");
            scheduleRender(renderMermaids, 60);
          }
        },
        true
      );

      // Focus button toggling
      document.addEventListener("click", (e) => {
        const btn = e.target.closest?.(".mermaid-focus-btn");
        if (!btn) return;
        const wrap = btn.closest(".mermaid-wrapper");
        if (!wrap) return;
        const isFocused = wrap.classList.contains("focused");
        logInfo(`Focus button clicked; toggling to ${!isFocused ? "open" : "closed"}.`);
        setFocus(wrap, !isFocused, true);
      });

      // Click outside to close focus
      document.addEventListener("click", (e) => {
        const wrap = document.querySelector(".mermaid-wrapper.focused");
        if (!wrap) return;
        const diagram = wrap.querySelector(".mermaid");
        const clickedOutside = !diagram.contains(e.target) && !e.target.closest(".mermaid-focus-btn");
        if (clickedOutside) {
          logInfo("Clicked outside focused diagram; closing focus.");
          setFocus(wrap, false, true);
        }
      });

      // ESC to close focus
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        const wrap = document.querySelector(".mermaid-wrapper.focused");
        if (!wrap) return;
        logInfo("Escape pressed; closing focus.");
        setFocus(wrap, false, true);
      });
    })
    .catch((err) => {
      // EXTRA LOG you asked for: clear reason when Mermaid fails to load
      logError("Mermaid failed to load from CDN:", err);
      logWarn("Diagrams will remain as raw text. Check your network/CSP or try another CDN.");
    });
})();
</script>
